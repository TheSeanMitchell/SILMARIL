                      if (pnl !== undefined && pnl !== null) {
                        const pcls = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
                        pnlStr = ' <span class="' + pcls + '">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2) + '</span>';
                      }
                      html += '<div class="row"><span class="' + cls + '">' + time + ' ' +
                              o.action + ' ' + (o.symbol || '') + '</span><span>' +
                              (o.notional ? '$' + o.notional : (o.qty ? o.qty.toFixed(2) + ' sh' : '')) +
                              pnlStr + '</span></div>';
                    }
                  }
                  panel.innerHTML = html;
                }
              } catch(e) {
                console.error('[alpha21] init failed:', e);
              }
            };
            // Fire on DOM ready and again 2s later (in case page renders dynamically)
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', () => silmarilAlpha21Init());
            } else {
              silmarilAlpha21Init();
            }
            setTimeout(() => silmarilAlpha21Init(), 2000);
          })();
          </script>
          """
          if "</body>" in c:
              c = c.replace("</body>", widgets + "\n</body>")
          else:
              c = c + "\n" + widgets
          p.write_text(c)
          print("OK: index.html v4 widgets injected")
          PYEOF

