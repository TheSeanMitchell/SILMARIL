name: Force Alpaca Orders (bypass pipeline)

# Directly reads signals.json and places Alpaca orders for top BUYs right now.
# Does NOT run the full debate pipeline — just takes today's signals and trades.
# Use when: you have strong buys showing but no orders are being placed.

on:
  workflow_dispatch:
    inputs:
      min_conviction:
        description: 'Min conviction threshold (default 0.50 — lower than normal to catch more)'
        required: false
        default: '0.50'
      max_orders:
        description: 'Max new orders to place (default 5)'
        required: false
        default: '5'
      close_holds:
        description: 'Close positions with HOLD/SELL consensus? (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  force_orders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Alpaca
        run: pip install alpaca-py

      - name: Place orders directly from signals.json
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          python3 << 'EOF'
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone

          MIN_CONVICTION = float(os.environ.get("MIN_CONVICTION", "0.50"))
          MAX_ORDERS     = int(os.environ.get("MAX_ORDERS", "5"))
          CLOSE_HOLDS    = os.environ.get("CLOSE_HOLDS", "true").lower() == "true"
          MAX_POSITIONS  = 15
          MAX_POS_PCT    = 0.05

          try:
              from alpaca.trading.client import TradingClient
              from alpaca.trading.requests import MarketOrderRequest
              from alpaca.trading.enums import OrderSide, TimeInForce
          except ImportError:
              print("alpaca-py not installed")
              exit(1)

          key = os.environ.get("ALPACA_API_KEY")
          sec = os.environ.get("ALPACA_API_SECRET")
          if not key or not sec:
              print("Alpaca secrets not set")
              exit(1)

          client = TradingClient(key, sec, paper=True)
          account = client.get_account()
          equity  = float(account.equity)
          print(f"Account: ${equity:.2f} equity, ${float(account.cash):.2f} cash")

          # Load current positions
          existing = list(client.get_all_positions())
          held = {p.symbol: p for p in existing}
          print(f"Current positions: {len(existing)} — {[p.symbol for p in existing]}")

          # ── Step 1: Close holds/sells if requested ───────────────────────
          signals_path = Path("docs/data/signals.json")
          if not signals_path.exists():
              print("signals.json not found — cannot proceed")
              exit(1)

          signals = json.loads(signals_path.read_text())
          debates = signals.get("debates", [])
          signal_map = {
              d["ticker"]: {
                  "signal": d.get("consensus", {}).get("signal", "HOLD"),
                  "conviction": d.get("consensus", {}).get("avg_conviction", 0),
              }
              for d in debates
          }

          closed = []
          if CLOSE_HOLDS:
              for pos in existing:
                  sym = pos.symbol
                  sig = signal_map.get(sym, {}).get("signal", "UNKNOWN")
                  if sig in ("HOLD", "SELL", "STRONG_SELL", "UNKNOWN"):
                      try:
                          client.close_position(sym)
                          closed.append(sym)
                          print(f"CLOSED {sym} (consensus: {sig})")
                      except Exception as e:
                          print(f"Could not close {sym}: {e}")

          # Refresh positions after closes
          existing = list(client.get_all_positions())
          held = {p.symbol for p in existing}
          available_slots = max(0, MAX_POSITIONS - len(existing))
          print(f"After closes: {len(existing)} positions, {available_slots} slots available")

          # ── Step 2: Place buy orders for top BUYs ───────────────────────
          buy_candidates = [
              d for d in debates
              if d.get("consensus", {}).get("signal") in ("BUY", "STRONG_BUY")
              and (d.get("consensus", {}).get("avg_conviction") or 0) >= MIN_CONVICTION
              and d.get("asset_class", "equity") in ("equity", "etf")
              and d.get("ticker") not in held
              and d.get("price", 0) > 0
          ]
          buy_candidates.sort(
              key=lambda d: (d["consensus"].get("score", 0), d["consensus"].get("avg_conviction", 0)),
              reverse=True
          )

          print(f"\nEligible BUY candidates (conviction >= {MIN_CONVICTION}): {len(buy_candidates)}")
          for c in buy_candidates[:10]:
              print(f"  {c['ticker']}: {c['consensus']['signal']} "
                    f"conviction={c['consensus'].get('avg_conviction'):.3f} "
                    f"score={c['consensus'].get('score'):.3f}")

          orders_placed = []
          for d in buy_candidates[:min(available_slots, MAX_ORDERS)]:
              ticker = d["ticker"]
              price  = float(d.get("price", 0))
              if price <= 0:
                  continue
              try:
                  position_dollars = equity * MAX_POS_PCT
                  qty = max(1, int(position_dollars / price))
                  order = MarketOrderRequest(
                      symbol=ticker, qty=qty,
                      side=OrderSide.BUY,
                      time_in_force=TimeInForce.DAY,
                  )
                  placed = client.submit_order(order)
                  orders_placed.append({
                      "ticker": ticker, "qty": qty, "price": price,
                      "signal": d["consensus"]["signal"],
                      "conviction": d["consensus"].get("avg_conviction"),
                      "alpaca_id": str(placed.id),
                  })
                  print(f"ORDER PLACED: BUY {qty} {ticker} @ ~${price:.2f}")
              except Exception as e:
                  print(f"Order failed for {ticker}: {e}")

          # ── Step 3: Write results ────────────────────────────────────────
          result = {
              "run_at": datetime.now(timezone.utc).isoformat(),
              "equity": equity,
              "positions_before": len(held),
              "positions_closed": closed,
              "orders_placed": orders_placed,
              "min_conviction_used": MIN_CONVICTION,
          }
          out = Path("docs/data/force_orders_log.json")
          out.write_text(json.dumps(result, indent=2, default=str))
          print(f"\nSummary: closed {len(closed)} positions, placed {len(orders_placed)} orders")
          print("Results written to docs/data/force_orders_log.json")
          EOF

        env:
          MIN_CONVICTION: ${{ github.event.inputs.min_conviction }}
          MAX_ORDERS:     ${{ github.event.inputs.max_orders }}
          CLOSE_HOLDS:    ${{ github.event.inputs.close_holds }}

      - name: Commit log
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/force_orders_log.json
          git diff --staged --quiet || git commit -m "force orders $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
