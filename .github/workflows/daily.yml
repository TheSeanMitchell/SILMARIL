name: SILMARIL Daily Run

# Runs every 30 minutes during US market hours (Mon-Fri 13:30-21:00 UTC),
# plus 4x daily on weekends for crypto. Manual trigger also available.

on:
  schedule:
    - cron: '*/30 13-21 * * 1-5'
    - cron: '0 0,6,12,18 * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

# v1.6: shares concurrency group with backtest.yml. Whichever workflow runs
# second waits for the first to release the lock, so the two never collide
# on git push (the cause of the 'fetch first' rejection seen on 2026-04-28).
concurrency:
  group: silmaril-repo-write
  cancel-in-progress: false

jobs:
  run-silmaril:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SILMARIL (live data)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python -m silmaril --live --output docs/data --verbose

      - name: Commit updated data
        run: |
          git config --local user.email "silmaril-bot@users.noreply.github.com"
          git config --local user.name "SILMARIL Bot"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "✦ SILMARIL data refresh — $(date -u +%Y-%m-%d)"

          # v1.6: rebase against incoming work before push, with retry.
          # Belt-and-suspenders: even though concurrency group should serialize,
          # if a backtest pushes between our checkout and our push, we recover.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $attempt failed; retrying after fetch..."
            sleep 5
          done
