name: Daily Run (10-min cadence)

on:
  schedule:
    # Every 10 minutes during US market hours, ALL days including weekends
    # Weekdays: 14:00–21:00 UTC = 9:30am–4:30pm ET (live market hours)
    # Weekends: 16:00–20:00 UTC = narrower window, catches Sunday evening pre-market
    # Crypto and prediction markets run 24/7 — agents still need to act on weekends.
    - cron: '*/10 14-21 * * 1-5'   # weekdays: full market hours
    - cron: '*/30 16-20 * * 0,6'   # weekends: every 30min, narrower window
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: silmaril-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live mode
        env:
          ALPHA_VANTAGE_API_KEY:  ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          BIRDEYE_API_KEY:        ${{ secrets.BIRDEYE_API_KEY }}
          COINGECKO_API_KEY:      ${{ secrets.COINGECKO_API_KEY }}
          EIA_API_KEY:            ${{ secrets.EIA_API_KEY }}
          FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY:            ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY:           ${{ secrets.FRED_API_KEY }}
          OPENEXCHANGERATES_APP_ID: ${{ secrets.OPENEXCHANGERATES_APP_ID }}
          POLYGON_API_KEY:        ${{ secrets.POLYGON_API_KEY }}
          TIINGO_API_KEY:         ${{ secrets.TIINGO_API_KEY }}
          ALPACA_API_KEY:         ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:      ${{ secrets.ALPACA_API_SECRET }}
        run: |
          python -m silmaril --live

      - name: Verify learning state preserved
        run: |
          python -c "
          from pathlib import Path
          from silmaril.learning.persistence_guard import verify_persistence
          import json
          report = verify_persistence(Path('docs/data'))
          print('Protected files present:', len(report['present']), '/', report['total_protected'])
          if report['missing']:
              print('Missing (will be created on next run):', report['missing'][:5])
          "

      - name: Commit results
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/ docs/index.html docs/*.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 daily run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "nothing to push"
