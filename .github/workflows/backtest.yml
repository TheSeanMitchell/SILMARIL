name: SILMARIL Backtest

# Manual-trigger workflow to run the 4-year backtest framework against
# the current agent cohort. Output lands in docs/data/backtest_report.json
# and is committed to the repo so the dashboard can read it.
#
# Trigger from Actions tab → "SILMARIL Backtest" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Backtest start date (YYYY-MM-DD)'
        required: true
        default: '2022-01-01'
      end:
        description: 'Backtest end date (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      universe:
        description: 'Universe: demo (25 tickers, fast) or full (your live universe, slow)'
        required: true
        default: 'demo'
      walk_forward:
        description: 'Run walk-forward stability analysis (yes/no)'
        required: true
        default: 'yes'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pyarrow

      - name: Run backtest
        run: |
          mkdir -p docs/data
          WF=""
          if [ "${{ github.event.inputs.walk_forward }}" = "yes" ]; then
            WF="--walk-forward"
          fi
          python -m silmaril.backtest \
            --start "${{ github.event.inputs.start }}" \
            --end "${{ github.event.inputs.end }}" \
            --universe "${{ github.event.inputs.universe }}" \
            $WF \
            --out-dir docs/data

      - name: Commit backtest report
        run: |
          git config --local user.email "silmaril-bot@users.noreply.github.com"
          git config --local user.name "SILMARIL Bot"
          git add docs/data/backtest_report.json
          if git diff --staged --quiet; then
            echo "No backtest output to commit (run failed?)."
            exit 1
          else
            git commit -m "✦ SILMARIL backtest run — $(date -u +%Y-%m-%d)"
            git push
          fi
