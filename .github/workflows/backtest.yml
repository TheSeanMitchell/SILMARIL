name: SILMARIL Backtest

# Manual-trigger workflow to run the 4-year backtest framework against
# the current agent cohort. Output lands in docs/data/backtest_*.json
# and is committed to the repo so the dashboard can read it.

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Backtest start date (YYYY-MM-DD)'
        required: true
        default: '2022-01-01'
      end:
        description: 'Backtest end date (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      universe:
        description: 'Universe: demo (24 tickers, ~3 min) or full (~360 tickers, ~30-40 min)'
        required: true
        default: 'demo'
      walk_forward:
        description: 'Run walk-forward stability analysis (yes/no)'
        required: true
        default: 'yes'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pyarrow

      - name: Run backtest
        run: |
          mkdir -p docs/data
          WF=""
          if [ "${{ github.event.inputs.walk_forward }}" = "yes" ]; then
            WF="--walk-forward"
          fi
          # Lowercase the universe input so 'FULL' or 'Full' both work
          UNIVERSE=$(echo "${{ github.event.inputs.universe }}" | tr '[:upper:]' '[:lower:]')
          python -m silmaril.backtest \
            --start "${{ github.event.inputs.start }}" \
            --end "${{ github.event.inputs.end }}" \
            --universe "$UNIVERSE" \
            $WF \
            --out-dir docs/data

      - name: Commit backtest output
        run: |
          git config --local user.email "silmaril-bot@users.noreply.github.com"
          git config --local user.name "SILMARIL Bot"
          # v2.1: commit only the small report files. The predictions file
          # (millions of rows) frequently exceeds GitHub's 100MB single-file
          # limit on full-universe runs and is debug data anyway.
          git add docs/data/backtest_report.json docs/data/backtest_walk_forward.json
          # Also remove any predictions file from the working tree so it
          # doesn't get auto-staged in future runs
          rm -f docs/data/backtest_predictions.json || true
          if git diff --staged --quiet; then
            echo "No backtest output to commit (run failed?)."
            exit 1
          else
            git commit -m "✦ SILMARIL backtest run — $(date -u +%Y-%m-%d)"
            git push
          fi
